# OPA Gatekeeper Constraint: Block privileged containers
# Equivalent of what you'd apply in a HIPAA-regulated EKS cluster to
# prevent container escape and privilege escalation paths.
#
# Two resources needed:
#   1. ConstraintTemplate - defines the Rego policy logic
#   2. Constraint - applies the template to specific resources
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: noprivilegedcontainers
  annotations:
    description: >-
      Blocks pods that run containers in privileged mode.
      A privileged container has root-equivalent access to the host.
      Required by: SOC2 CC6.1, HIPAA 164.312(a)(1)
spec:
  crd:
    spec:
      names:
        kind: NoPrivilegedContainers
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package noprivilegedcontainers

        import future.keywords.contains
        import future.keywords.if

        violation contains msg if {
          container := input.review.object.spec.containers[_]
          container.securityContext.privileged == true
          msg := sprintf(
            "Container %v in Pod %v is running as privileged. Privileged containers are not allowed.",
            [container.name, input.review.object.metadata.name]
          )
        }

        violation contains msg if {
          container := input.review.object.spec.initContainers[_]
          container.securityContext.privileged == true
          msg := sprintf(
            "Init container %v in Pod %v is running as privileged.",
            [container.name, input.review.object.metadata.name]
          )
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: NoPrivilegedContainers
metadata:
  name: no-privileged-containers
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [apps]
        kinds: [Deployment, StatefulSet, DaemonSet]
      - apiGroups: [""]
        kinds: [Pod]
    namespaces:
      - devsecops-dev
      - devsecops-prod
